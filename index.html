<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등학교 통합 시간표 검색기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 인쇄 최적화 CSS (1페이지 가로 맞춤 및 6교시 잘림 방지) */
        @media print {
            @page { size: A4 landscape; margin: 8mm; }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body, main { background-color: white !important; height: auto !important; overflow: visible !important; display: block !important; flex-grow: 0 !important; }
            
            /* 불필요 패널 숨김 및 메인 영역 확장 */
            .print-hide { display: none !important; }
            .print-full { grid-column: 1 / -1 !important; width: 100% !important; border: none !important; box-shadow: none !important; padding: 0 !important; overflow: visible !important; }
            .overflow-x-auto, .overflow-hidden, #scrollContainer { overflow: visible !important; height: auto !important; padding-bottom: 0 !important; }
            
            /* 타이틀 최적화 */
            .print-show { display: block !important; margin-bottom: 12px !important; }
            #printTitle { font-size: 20pt !important; margin-bottom: 4px !important; }
            #printSubtitle { font-size: 11pt !important; margin-bottom: 4px !important; }
            #printContact { font-size: 9pt !important; }

            /* 시간표 카드 전체적인 패딩 및 간격 압축 */
            .print-grid { display: flex !important; width: 100% !important; gap: 4px !important; }
            .print-grid > div { flex: 1; min-width: 0 !important; gap: 4px !important; }
            
            /* 요일 및 학사일정 띠 압축 */
            .print-grid > div > div:nth-child(1) { padding: 4px !important; }
            .print-grid > div > div:nth-child(1) p:first-child { font-size: 11pt !important; }
            .print-grid > div > div:nth-child(1) p:last-child { font-size: 8pt !important; margin-top: 0 !important; }
            .print-grid > div > div:nth-child(2) { min-height: 20px !important; padding: 2px !important; font-size: 8pt !important; }
            
            /* 1~6교시 개별 카드 압축 (핵심) */
            .print-grid > div > div:nth-child(3) { gap: 3px !important; }
            .print-grid > div > div:nth-child(3) > div { 
                min-height: auto !important;
                padding: 4px !important;
            }
            .print-grid > div > div:nth-child(3) > div > div:first-child { margin-bottom: 0 !important; }
            .print-grid > div > div:nth-child(3) > div h4 { font-size: 13pt !important; padding: 2px 0 !important; }
            .print-grid > div > div:nth-child(3) > div span { font-size: 7pt !important; padding: 1px 3px !important; }
        }
        
        @keyframes slideInUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased h-[100dvh] flex flex-col overflow-hidden relative">

    <!-- 로딩 화면 -->
    <div id="initialLoader" class="fixed inset-0 bg-slate-50 z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <i class="fa-solid fa-school-flag text-6xl text-indigo-500 mb-6 animate-bounce"></i>
        <h2 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">학교 정보를 동기화 중입니다</h2>
        <p class="text-sm font-semibold text-slate-500 mb-6">경상남도 초등학교 최신 목록을 불러옵니다.</p>
        <div class="flex gap-1.5">
            <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0s;"></div>
            <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
            <div class="w-2.5 h-2.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
        </div>
    </div>

    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-200 z-30 flex-none no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div onclick="resetApp()" class="flex items-center gap-3 cursor-pointer group" title="처음 실행 상태로 되돌아가기">
                    <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md group-hover:bg-indigo-700 transition">
                        <i class="fa-solid fa-school text-xl"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold tracking-tight text-slate-900 leading-tight group-hover:text-indigo-600 transition">초등학교 통합 시간표 검색기</h1>
                        <p class="text-[10px] text-slate-500 font-medium mt-0.5">나이스(NEIS) API - 경상남도교육청</p>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <div id="savedSchoolBadge" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 bg-slate-50 text-slate-500 rounded-lg text-xs font-semibold border border-slate-200 transition-colors">
                    <i class="fa-solid fa-house"></i> <span id="savedSchoolNameDisplay">저장 안 됨</span>
                </div>
                <button onclick="saveCurrentSchool()" class="flex items-center gap-1.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-lg text-sm font-bold transition border border-indigo-100 shadow-sm" title="현재 선택된 학교를 다음 접속 시 기본값으로 저장">
                    <i class="fa-solid fa-bookmark"></i> <span class="hidden sm:inline">학교저장</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow overflow-y-auto w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6">
        
        <!-- 검색 필터 섹션 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 no-print">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                
                <div class="flex flex-col gap-1.5 lg:col-span-1">
                    <label class="text-xs font-semibold text-slate-500">지역</label>
                    <div class="relative">
                        <i class="fa-solid fa-map-location-dot absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <select id="regionSelect" onchange="handleRegionChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none">
                            <optgroup label="창원권"><option value="창원">창원</option><option value="마산">마산</option><option value="진해">진해</option></optgroup>
                            <optgroup label="시 단위"><option value="진주">진주</option><option value="통영">통영</option><option value="사천">사천</option><option value="김해">김해</option><option value="밀양">밀양</option><option value="거제">거제</option><option value="양산">양산</option></optgroup>
                            <optgroup label="군 단위"><option value="의령">의령</option><option value="함안">함안</option><option value="창녕">창녕</option><option value="고성">고성</option><option value="남해">남해</option><option value="하동">하동</option><option value="산청">산청</option><option value="함양">함양</option><option value="거창">거창</option><option value="합천">합천</option></optgroup>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                    </div>
                </div>

                <div class="lg:col-span-2 flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">학교명</label>
                    <div class="relative">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <select id="schoolSelect" onchange="handleSchoolChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none"></select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">학년도</label>
                    <div class="relative">
                        <select id="yearSelect" onchange="handleYearChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none">
                            <option value="2026">2026학년도</option><option value="2025" selected>2025학년도</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-semibold text-slate-500">학기</label>
                    <div class="relative">
                        <select id="semesterSelect" onchange="handleFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none">
                            <option value="1">1학기</option><option value="2">2학기</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5 lg:col-span-1">
                    <label class="text-xs font-semibold text-slate-500">학년/반</label>
                    <div class="flex gap-2">
                        <div class="relative w-1/2">
                            <select id="gradeSelect" onchange="handleGradeChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-2 pr-6 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none"></select>
                            <i class="fa-solid fa-chevron-down absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none"></i>
                        </div>
                        <div class="relative w-1/2">
                            <select id="classSelect" onchange="handleFilterChange()" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-2 pr-6 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 transition appearance-none"></select>
                            <i class="fa-solid fa-chevron-down absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 text-[10px] pointer-events-none"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            <!-- 좌측 패널 -->
            <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm border border-slate-100 p-5 no-print lg:sticky lg:top-0 print-hide">
                <div class="text-center mb-5 pb-5 border-b border-slate-100">
                    <div onclick="fetchAndShowSchoolInfo()" class="w-16 h-16 mx-auto bg-indigo-50 hover:bg-indigo-100 text-indigo-500 rounded-full flex items-center justify-center text-3xl mb-3 shadow-inner cursor-pointer transition" title="클릭하여 학교 기본정보 보기">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h2 id="sideSchoolName" onclick="fetchAndShowSchoolInfo()" class="font-extrabold text-lg text-slate-900 cursor-pointer hover:text-indigo-600 transition flex items-center justify-center gap-1.5">학교명 로딩중 <i class="fa-solid fa-circle-info text-xs text-slate-300"></i></h2>
                    <p id="sideGradeClass" class="text-sm font-medium text-slate-500 mt-1 bg-slate-100 inline-block px-3 py-1 rounded-full">-</p>
                    
                    <div class="mt-4 text-left bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
                        <div class="flex items-start gap-2 text-slate-600"><i class="fa-solid fa-location-dot mt-0.5 text-indigo-400 w-3 text-center text-xs"></i><p id="sideAddress" class="text-xs font-semibold leading-relaxed flex-1 tracking-tight break-keep">-</p></div>
                        <div class="flex items-start gap-2 text-slate-600"><i class="fa-solid fa-phone mt-0.5 text-indigo-400 w-3 text-center text-xs"></i><p id="sidePhoneOffice" class="text-xs font-semibold leading-relaxed flex-1 tracking-tight">-</p></div>
                        <div class="flex items-start gap-2 text-slate-600"><i class="fa-solid fa-tty mt-0.5 text-indigo-400 w-3 text-center text-xs"></i><p id="sidePhoneAdmin" class="text-xs font-semibold leading-relaxed flex-1 tracking-tight">-</p></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <ul class="text-sm space-y-3">
                        <li class="flex justify-between items-center text-slate-600"><span class="flex items-center gap-1.5"><i class="fa-regular fa-calendar-check text-slate-400 w-4"></i> 학년도/학기</span><span id="sideSemText" class="font-semibold text-slate-900">-</span></li>
                        <li class="flex justify-between items-center text-slate-600"><span class="flex items-center gap-1.5"><i class="fa-regular fa-clock text-slate-400 w-4"></i> 기본 교시</span><span class="font-semibold text-slate-900">1~6교시 (40분)</span></li>
                    </ul>
                    <div class="pt-2">
                        <button onclick="fetchAndShowMealInfo()" class="w-full bg-orange-50 hover:bg-orange-100 text-orange-700 text-xs font-bold py-3 sm:py-2.5 px-4 rounded-xl transition duration-150 flex items-center justify-center gap-2 border border-orange-200 border-dashed shadow-sm">
                            <i class="fa-solid fa-utensils"></i> 오늘의 급식 정보 보기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 우측 시간표 그리드 -->
            <div class="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-100 p-4 sm:p-6 overflow-hidden print-full">
                
                <!-- 인쇄 전용 헤더 -->
                <div class="hidden print-show text-center mb-8">
                    <h1 id="printTitle" class="text-3xl font-extrabold text-slate-900 mb-2"></h1>
                    <p id="printSubtitle" class="text-lg font-semibold text-slate-600 mb-1"></p>
                    <p id="printContact" class="text-sm font-medium text-slate-500"></p>
                </div>

                <!-- 화면용 상단 컨트롤 -->
                <div class="flex flex-col gap-4 mb-4 sm:mb-6 no-print">
                    <div>
                        <h2 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2">
                            주간 시간표 <span id="weekRangeTitle" class="text-sm sm:text-base font-semibold text-slate-500 tracking-normal ml-2"></span>
                        </h2>
                    </div>
                    
                    <div class="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/60 p-2 sm:p-3 rounded-xl border border-slate-100">
                        <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                            <label class="text-xs font-semibold text-slate-500 whitespace-nowrap hidden sm:block">기준 날짜 선택:</label>
                            <div class="flex items-center gap-2">
                                <div class="flex items-center gap-1 bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                                    <button onclick="changeDate(-7)" class="p-1.5 hover:bg-slate-50 rounded-lg transition" title="1주일 이전"><i class="fa-solid fa-angles-left text-xs"></i></button>
                                    <button onclick="changeDate(-1)" class="p-1.5 hover:bg-slate-50 rounded-lg transition" title="하루 이전"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                                    <input type="date" id="datePicker" onchange="handleDateChange()" class="bg-transparent border-none text-sm font-semibold focus:outline-none px-1 text-slate-700 w-32 sm:w-auto cursor-pointer">
                                    <button onclick="changeDate(1)" class="p-1.5 hover:bg-slate-50 rounded-lg transition" title="하루 다음"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                                    <button onclick="changeDate(7)" class="p-1.5 hover:bg-slate-50 rounded-lg transition" title="1주일 다음"><i class="fa-solid fa-angles-right text-xs"></i></button>
                                </div>
                                <button onclick="goToToday()" class="bg-white hover:bg-indigo-50 text-indigo-600 text-sm font-extrabold py-2 px-4 border border-indigo-200 rounded-xl transition shadow-sm">오늘</button>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto justify-end">
                            <button onclick="printTimetable()" class="bg-white hover:bg-slate-50 text-slate-700 text-sm font-extrabold py-2 px-5 border border-slate-200 rounded-xl transition flex items-center justify-center gap-2 shadow-sm w-full md:w-auto">
                                <i class="fa-solid fa-print text-base"></i> 인쇄
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 모바일 스와이프 안내 -->
                <div class="sm:hidden flex justify-center items-center gap-2 mb-4 mt-0 text-[11px] font-bold text-indigo-500 bg-indigo-50/70 py-1.5 rounded-xl border border-indigo-100 shadow-sm">
                    <i class="fa-solid fa-hand-point-left animate-pulse"></i>좌우로 스와이프하여 요일 이동<i class="fa-solid fa-hand-point-right animate-pulse"></i>
                </div>

                <!-- 시간표 카드 출력 영역 -->
                <div id="scrollContainer" class="overflow-x-auto hide-scrollbar snap-x snap-mandatory -mx-4 px-4 sm:mx-0 sm:px-0 pb-4">
                    <div id="timetableGrid" class="flex sm:grid sm:grid-cols-5 gap-3 sm:gap-4 print-grid w-max sm:w-full"></div>
                </div>

                <div id="loadingIndicator" class="hidden my-12 text-center">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-3"></i>
                    <p class="text-sm text-slate-500 font-medium animate-pulse">데이터를 불러오는 중입니다...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 text-xs py-8 mt-4 border-t border-slate-800 no-print flex-none">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col justify-center items-center text-center gap-2">
            <span class="text-slate-500">본 서비스는 교육청(NEIS) 공공데이터(OpenAPI)를 활용하여 실시간 정보를 제공합니다.</span>
        </div>
    </footer>

    <!-- 모달: 급식 -->
    <div id="mealInfoModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity opacity-0 no-print">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[80vh]" id="mealInfoModalContent">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-orange-500 text-white">
                <h3 class="font-bold text-lg flex items-center gap-2"><i class="fa-solid fa-utensils"></i> <span id="mealModalTitle">오늘의 급식 정보</span></h3>
                <button onclick="closeMealInfoModal()" class="text-orange-100 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-6 overflow-y-auto hide-scrollbar bg-slate-50 flex-1 relative">
                <div id="mealInfoLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10 hidden">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-orange-500 mb-2"></i>
                </div>
                <div id="mealInfoBody" class="space-y-4"></div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end">
                <button onclick="closeMealInfoModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 transition">닫기</button>
            </div>
        </div>
    </div>

    <!-- 모달: 학교 기본 정보 -->
    <div id="schoolInfoModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity opacity-0 no-print">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[85vh]" id="schoolInfoModalContent">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-600 text-white">
                <h3 class="font-bold text-xl flex items-center gap-2"><i class="fa-solid fa-building-columns"></i> 학교 기본 정보 개요</h3>
                <button onclick="closeSchoolInfoModal()" class="text-indigo-200 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="schoolInfoContent" class="p-6 overflow-y-auto hide-scrollbar bg-slate-50 flex-1 relative">
                <div id="schoolInfoLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500 mb-2"></i>
                </div>
                <div id="schoolInfoGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end">
                <button onclick="closeSchoolInfoModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 transition">닫기</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none w-full max-w-sm px-4 no-print"></div>

    <script>
        /* ==================== 1. 기본 설정 및 데이터 ==================== */
        const ALL_REGION_NAMES = ["창원", "마산", "진해", "진주", "통영", "사천", "김해", "밀양", "거제", "양산", "의령", "함안", "창녕", "고성", "남해", "하동", "산청", "함양", "거창", "합천"];
        let REGIONS = {};
        ALL_REGION_NAMES.forEach(r => REGIONS[r] = []);
        let SCHOOLS_DB = {};

        const state = {
            region: "마산", school: "", year: "2025", semester: "1", grade: "1", class: "", date: "", 
            apiKey: "89f71f30a00545d2b8fc928abf0fcaee", gradeClassMap: {} 
        };
        let currentRenderId = 0; 
        const subjectColors = { "국어": "bg-red-50 text-red-600 border-red-100", "수학": "bg-blue-50 text-blue-600 border-blue-100", "사회": "bg-orange-50 text-orange-600 border-orange-100", "과학": "bg-green-50 text-green-600 border-green-100", "영어": "bg-indigo-50 text-indigo-600 border-indigo-100", "음악": "bg-pink-50 text-pink-600 border-pink-100", "미술": "bg-yellow-50 text-yellow-600 border-yellow-100", "체육": "bg-teal-50 text-teal-600 border-teal-100", "도덕": "bg-purple-50 text-purple-600 border-purple-100", "실과": "bg-rose-50 text-rose-600 border-rose-100", "창체": "bg-slate-50 text-slate-600 border-slate-200" };
        const ALLERGY_MAP = { 1: '난류', 2: '우유', 3: '메밀', 4: '땅콩', 5: '대두', 6: '밀', 7: '고등어', 8: '게', 9: '새우', 10: '돼지고기', 11: '복숭아', 12: '토마토', 13: '아황산류', 14: '호두', 15: '닭고기', 16: '쇠고기', 17: '오징어', 18: '조개류', 19: '잣' };

        /* ==================== 2. 유틸리티 ==================== */
        function getFormattedDate(date) {
            const y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }
        function getWeekRange(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const date = new Date(y, m - 1, d);
            const diffToMonday = date.getDay() === 0 ? -6 : 1 - date.getDay();
            const monday = new Date(date); monday.setDate(date.getDate() + diffToMonday);
            const days = [];
            for (let i = 0; i < 5; i++) { 
                const cd = new Date(monday); cd.setDate(monday.getDate() + i);
                days.push({ date: cd, dateStr: getFormattedDate(cd), dayName: ['월', '화', '수', '목', '금'][i] });
            }
            return days;
        }
        function autoDetermineYearSemester(dateStr) {
            const d = new Date(dateStr.replace(/-/g, '/')), year = d.getFullYear(), month = d.getMonth() + 1;
            let targetYear = year, sem = "1";
            if (month <= 2) { targetYear -= 1; sem = "2"; } else if (month >= 8) { sem = "2"; }
            if (targetYear < 2025) targetYear = 2025; if (targetYear > 2026) targetYear = 2026;
            return { academicYear: String(targetYear), semester: sem };
        }

        /* ==================== 3. 공통 UI 제어 ==================== */
        let toastTimeout;
        function showToast(msg, type = "info") {
            const container = document.getElementById("toastContainer"), toast = document.createElement("div");
            toast.className = `toast-enter p-3 rounded-xl shadow-lg border flex items-center gap-3 text-sm font-semibold pointer-events-auto bg-white`;
            const icon = type === "success" ? '<i class="fa-solid fa-circle-check text-green-500"></i>' : type === "error" ? '<i class="fa-solid fa-circle-exclamation text-red-500"></i>' : '<i class="fa-solid fa-circle-info text-blue-500"></i>';
            toast.innerHTML = `${icon} <span class="text-slate-700">${msg}</span>`;
            container.innerHTML = ''; container.appendChild(toast);
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.replace("toast-enter", "toast-exit"); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        function updateSavedSchoolDisplay() {
            const savedSchool = localStorage.getItem("neis_saved_school"), displaySpan = document.getElementById("savedSchoolNameDisplay"), badge = document.getElementById("savedSchoolBadge");
            if (savedSchool) { displaySpan.innerText = savedSchool; badge.className = "hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-semibold border border-indigo-100 transition-colors"; } 
            else { displaySpan.innerText = "저장 안 됨"; badge.className = "hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 bg-slate-50 text-slate-500 rounded-lg text-xs font-semibold border border-slate-200 transition-colors"; }
        }

        /* ==================== 4. API 로직 ==================== */
        async function loadDynamicSchools() {
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1000&ATPT_OFCDC_SC_CODE=S10&SCHUL_KND_SC_NM=초등학교`);
                const data = await res.json();
                if (data.schoolInfo && data.schoolInfo[1]) {
                    ALL_REGION_NAMES.forEach(r => REGIONS[r] = []); SCHOOLS_DB = {};
                    data.schoolInfo[1].row.forEach(row => {
                        const addr = row.ORG_RDNMA || ""; let region = "";
                        if (addr.includes("창원시")) region = (addr.includes("마산합포구") || addr.includes("마산회원구")) ? "마산" : addr.includes("진해구") ? "진해" : "창원";
                        else ALL_REGION_NAMES.forEach(r => { if(r !== "창원" && r !== "마산" && r !== "진해" && (addr.includes(r+"시") || addr.includes(r+"군"))) region = r; });
                        
                        // [수정점] 이름 축약 로직 완전 제거. 모든 학교 공식 명칭 그대로 유지
                        if (region) {
                            let dName = row.SCHUL_NM;
                            REGIONS[region].push(dName);
                            SCHOOLS_DB[`${region}_${dName}`] = { officeCode: row.ATPT_OFCDC_SC_CODE, schoolCode: row.SD_SCHUL_CODE, name: row.SCHUL_NM, address: addr, phone: row.ORG_TELNO || "-" };
                        }
                    });
                    ALL_REGION_NAMES.forEach(r => REGIONS[r].sort());
                    return true;
                }
            } catch (e) { console.log(e); } return false;
        }

        async function fetchAndUpdateSchoolStructure() {
            if (!state.school) return;
            const sInfo = SCHOOLS_DB[`${state.region}_${state.school}`];
            if(!sInfo) return;
            document.getElementById("gradeSelect").innerHTML = `<option value="">로딩중...</option>`; document.getElementById("classSelect").innerHTML = `<option value="">로딩중...</option>`;
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/classInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1000&ATPT_OFCDC_SC_CODE=${sInfo.officeCode}&SD_SCHUL_CODE=${sInfo.schoolCode}&AY=${state.year}`);
                const data = await res.json();
                state.gradeClassMap = {};
                if (data.classInfo && data.classInfo[1]) {
                    data.classInfo[1].row.forEach(r => {
                        const g = parseInt(r.GRADE).toString(), c = r.CLASS_NM;
                        if (!state.gradeClassMap[g]) state.gradeClassMap[g] = [];
                        if (c && !state.gradeClassMap[g].includes(c)) state.gradeClassMap[g].push(c);
                    });
                }
            } catch (e) { state.gradeClassMap = {}; }
            renderDropdowns();
        }

        /* ==================== 5. 화면 렌더링 ==================== */
        function populateSchoolSelect() {
            const sel = document.getElementById("schoolSelect"); sel.innerHTML = "";
            REGIONS[state.region].forEach(n => sel.appendChild(new Option(n, n)));
        }
        function renderDropdowns() {
            const gSel = document.getElementById("gradeSelect"), cSel = document.getElementById("classSelect");
            const grades = Object.keys(state.gradeClassMap).sort((a,b) => a-b);
            gSel.innerHTML = "";
            if (grades.length > 0) {
                grades.forEach(g => gSel.appendChild(new Option(`${g}학년`, g)));
                if (!grades.includes(state.grade)) state.grade = grades[0];
                gSel.value = state.grade; gSel.disabled = false;
                
                const classes = (state.gradeClassMap[state.grade] || []).sort((a,b) => a-b);
                cSel.innerHTML = "";
                if(classes.length > 0) {
                    classes.forEach(c => cSel.appendChild(new Option(`${c}반`, c)));
                    if (!classes.includes(state.class)) state.class = classes[0];
                    cSel.value = state.class; cSel.disabled = false;
                } else { cSel.innerHTML = `<option value="">-</option>`; state.class = ""; cSel.disabled = true; }
            } else {
                gSel.innerHTML = `<option value="">-</option>`; cSel.innerHTML = `<option value="">-</option>`;
                state.grade = ""; state.class = ""; gSel.disabled = true; cSel.disabled = true;
            }
        }

        async function renderTimetable() {
            if (!state.school) return;
            const rid = ++currentRenderId, sInfo = SCHOOLS_DB[`${state.region}_${state.school}`];
            document.getElementById("sideSchoolName").innerHTML = `${state.school} <i class="fa-solid fa-circle-info text-xs text-slate-300"></i>`;
            document.getElementById("sideGradeClass").innerText = state.class ? `${state.grade}학년 ${state.class}반` : `${state.grade ? state.grade+'학년' : '-'}`;
            document.getElementById("sideSemText").innerText = `${state.year}학년도 ${state.semester}학기`;
            document.getElementById("sideAddress").innerText = sInfo?.address || "-";
            document.getElementById("sidePhoneOffice").innerText = `교무실: ${sInfo?.phone || '-'}`;
            
            let adminPhone = "-";
            if (sInfo?.phone && sInfo.phone.includes('-')) {
                const parts = sInfo.phone.split('-');
                if(!isNaN(parts[parts.length-1])) { parts[parts.length-1] = String(parseInt(parts[parts.length-1])+1).padStart(parts[parts.length-1].length, '0'); adminPhone = parts.join('-'); }
            }
            document.getElementById("sidePhoneAdmin").innerText = `행정실: ${adminPhone}`;

            const wDays = getWeekRange(state.date);
            document.getElementById("weekRangeTitle").innerText = `(${wDays[0].dateStr.substring(5).replace('-','/')} ~ ${wDays[4].dateStr.substring(5).replace('-','/')})`;
            
            document.getElementById("printTitle").innerText = `${state.school} ${state.grade}학년 ${state.class}반 주간 시간표`.trim();
            document.getElementById("printSubtitle").innerText = `${state.year}학년도 ${state.semester}학기 | ${wDays[0].dateStr.replace(/-/g, '.')} ~ ${wDays[4].dateStr.replace(/-/g, '.')}`;
            document.getElementById("printContact").innerText = `주소: ${sInfo?.address || '-'} | 교무실: ${sInfo?.phone || '-'} | 행정실: ${adminPhone}`;

            const grid = document.getElementById("timetableGrid"); grid.innerHTML = '';
            document.getElementById("loadingIndicator").classList.remove("hidden");

            let sMap = {};
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/SchoolSchedule?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${sInfo.officeCode}&SD_SCHUL_CODE=${sInfo.schoolCode}&AA_FROM_YMD=${wDays[0].dateStr.replace(/-/g,'')}&AA_TO_YMD=${wDays[4].dateStr.replace(/-/g,'')}`);
                const d = await res.json();
                if (d.SchoolSchedule) d.SchoolSchedule[1].row.forEach(r => { const dt = `${r.AA_YMD.substring(0,4)}-${r.AA_YMD.substring(4,6)}-${r.AA_YMD.substring(6,8)}`; if(!sMap[dt]) sMap[dt]=[]; if(!sMap[dt].includes(r.EVENT_NM)) sMap[dt].push(r.EVENT_NM); });
            } catch(e) {}

            for (const d of wDays) {
                if (currentRenderId !== rid) return;
                const col = document.createElement("div"); col.className = "flex flex-col gap-2 w-[80vw] max-w-[280px] sm:w-auto sm:max-w-none flex-shrink-0 snap-center";
                const isSelected = d.dateStr === state.date; if (isSelected) col.id = "todayColumn";
                
                const evt = sMap[d.dateStr] ? sMap[d.dateStr].join(', ') : '';
                const isHoliday = /휴업|방학|공휴|휴일|광복절|개천절|한글날|설날|추석|현충일|어린이날|성탄절|크리스마스|기념일|대체휴|선거/i.test(evt);

                col.innerHTML = `
                    <div class="${isSelected ? 'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-300 ring-offset-1' : 'bg-slate-700 text-white'} rounded-xl p-3 sm:p-3 text-center border">
                        <p class="font-extrabold text-base">${d.dayName}요일</p><p class="text-sm font-bold opacity-90 mt-0.5">${d.dateStr.substring(5).replace('-','.')}</p>
                    </div>
                    <div class="${evt ? (isHoliday ? 'bg-red-50 text-red-700 border-red-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200') : 'bg-slate-50/50 border-slate-200 border-dashed text-transparent'} text-xs font-bold p-2 sm:p-2 rounded-xl text-center border min-h-[40px] sm:min-h-[36px] flex items-center justify-center break-keep leading-tight shadow-sm">
                        ${evt ? `<i class="fa-solid ${isHoliday ? 'fa-calendar-xmark text-red-500' : 'fa-flag text-emerald-500'} mr-1"></i> ${evt}` : '-'}
                    </div>
                `;
                const cc = document.createElement("div"); cc.className = "flex flex-col gap-2 flex-grow"; col.appendChild(cc); grid.appendChild(col);

                let lessons = [];
                try {
                    const res = await fetch(`https://open.neis.go.kr/hub/elsTimetable?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${sInfo.officeCode}&SD_SCHUL_CODE=${sInfo.schoolCode}&AY=${state.year}&SEM=${state.semester}&ALL_TI_YMD=${d.dateStr.replace(/-/g,'')}&GRADE=${state.grade}&CLASS_NM=${state.class}`);
                    const dData = await res.json();
                    if(dData.elsTimetable) lessons = dData.elsTimetable[1].row.map(r => ({ p: parseInt(r.PERIO), sub: (r.ITRT_CNTNT||"").replace(/\*/g,'').trim() }));
                } catch(e) {}

                for (let p = 1; p <= 6; p++) {
                    const l = lessons.find(x => x.p === p), cd = document.createElement("div");
                    if (isHoliday) {
                        cd.className = "border rounded-xl px-2 py-2 sm:px-2 sm:py-1.5 relative shadow-sm h-full flex flex-col bg-red-50 border-red-200 text-red-700";
                        cd.innerHTML = `<div class="mb-1"><span class="text-sm font-black text-red-800 bg-white/80 px-2 py-0.5 rounded-lg shadow-sm">${p}교시</span></div><div class="text-center flex-grow flex items-center justify-center py-1"><h4 class="font-extrabold text-xl sm:text-lg opacity-70">${l ? l.sub : '-'}</h4></div>`;
                    } else if (!l) {
                        cd.className = "border rounded-xl px-2 py-2 sm:px-2 sm:py-1.5 border-dashed border-slate-200 bg-slate-50/40 min-h-[76px] sm:min-h-[64px] h-full flex flex-col items-center justify-center";
                    } else {
                        cd.className = `border rounded-xl px-2 py-2 sm:px-2 sm:py-1.5 relative shadow-sm h-full flex flex-col ${subjectColors[l.sub] || "bg-slate-50 text-slate-700 border-slate-200"}`;
                        cd.innerHTML = `<div class="mb-1 flex justify-between"><span class="text-sm font-black text-slate-800 bg-white/80 px-2 py-0.5 rounded-lg shadow-sm">${p}교시</span><i class="fa-solid fa-link text-[8px] opacity-40 mt-1"></i></div><div class="text-center flex-grow flex items-center justify-center py-1"><h4 class="font-extrabold text-xl sm:text-lg">${l.sub}</h4></div>`;
                    }
                    cc.appendChild(cd);
                }
            }
            if (currentRenderId === rid) {
                document.getElementById("loadingIndicator").classList.add("hidden");
                if (window.innerWidth < 640) setTimeout(() => document.getElementById("todayColumn")?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 150);
            }
        }

        /* ==================== 6. 이벤트 컨트롤 ==================== */
        async function handleRegionChange() { state.region = document.getElementById("regionSelect").value; populateSchoolSelect(); state.school = document.getElementById("schoolSelect").value; await fetchAndUpdateSchoolStructure(); await renderTimetable(); }
        async function handleSchoolChange() { state.school = document.getElementById("schoolSelect").value; await fetchAndUpdateSchoolStructure(); await renderTimetable(); }
        async function handleYearChange() { state.year = document.getElementById("yearSelect").value; await fetchAndUpdateSchoolStructure(); await renderTimetable(); }
        async function handleFilterChange() { state.semester = document.getElementById("semesterSelect").value; state.class = document.getElementById("classSelect").value; await renderTimetable(); }
        function handleGradeChange() { state.grade = document.getElementById("gradeSelect").value; renderDropdowns(); renderTimetable(); }
        
        async function updateDateAndRender() {
            document.getElementById("datePicker").value = state.date;
            const aInfo = autoDetermineYearSemester(state.date);
            if (state.year !== aInfo.academicYear) { state.year = aInfo.academicYear; state.semester = aInfo.semester; document.getElementById("yearSelect").value = state.year; document.getElementById("semesterSelect").value = state.semester; await fetchAndUpdateSchoolStructure(); }
            else { state.semester = aInfo.semester; document.getElementById("semesterSelect").value = state.semester; }
            await renderTimetable();
        }
        async function changeDate(d) {
            const cd = new Date(state.date.replace(/-/g, '/'));
            if (d === 1) { if(cd.getDay()===5) d=3; else if(cd.getDay()===6) d=2; } else if (d === -1) { if(cd.getDay()===1) d=-3; else if(cd.getDay()===0) d=-2; }
            cd.setDate(cd.getDate() + d); state.date = getFormattedDate(cd); await updateDateAndRender();
        }
        async function handleDateChange() { state.date = document.getElementById("datePicker").value; await updateDateAndRender(); }
        async function goToToday() { state.date = getFormattedDate(new Date()); await updateDateAndRender(); showToast("오늘로 이동했습니다.", "success"); }
        function printTimetable() { window.focus(); setTimeout(() => { try { window.print(); } catch(e) { showToast("인쇄를 지원하지 않습니다.", "error"); } }, 300); }

        function saveCurrentSchool() {
            localStorage.setItem("neis_saved_region", state.region); localStorage.setItem("neis_saved_school", state.school); localStorage.setItem("neis_saved_grade", state.grade); localStorage.setItem("neis_saved_class", state.class);
            showToast(`[${state.school}] 다음 접속 기본값으로 저장됨`, "success"); updateSavedSchoolDisplay();
        }

        async function resetApp() {
            const sReg = localStorage.getItem("neis_saved_region"), sSch = localStorage.getItem("neis_saved_school"), sGrd = localStorage.getItem("neis_saved_grade"), sCls = localStorage.getItem("neis_saved_class");
            if (sReg && ALL_REGION_NAMES.includes(sReg)) state.region = sReg;
            document.getElementById("regionSelect").value = state.region; populateSchoolSelect();
            if (sSch && REGIONS[state.region].includes(sSch)) state.school = sSch; else state.school = REGIONS[state.region][0] || "";
            document.getElementById("schoolSelect").value = state.school;
            if (sGrd) state.grade = sGrd; if (sCls) state.class = sCls;
            state.date = getFormattedDate(new Date());
            window.scrollTo({ top: 0, behavior: 'smooth' });
            await updateDateAndRender(); showToast("처음 실행 상태로 초기화되었습니다.", "success");
        }

        /* ==================== 7. 모달 정보 (학교/급식) ==================== */
        async function fetchAndShowSchoolInfo() {
            const m = document.getElementById("schoolInfoModal"), c = document.getElementById("schoolInfoModalContent"), g = document.getElementById("schoolInfoGrid"), l = document.getElementById("schoolInfoLoading");
            g.innerHTML = ''; l.classList.remove("hidden"); m.classList.remove("hidden"); m.classList.add("flex"); setTimeout(() => { m.classList.remove("opacity-0"); c.classList.remove("scale-95"); }, 10);
            const sInfo = SCHOOLS_DB[`${state.region}_${state.school}`];
            if(!sInfo) return;
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/schoolInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1&ATPT_OFCDC_SC_CODE=${sInfo.officeCode}&SD_SCHUL_CODE=${sInfo.schoolCode}`);
                const data = await res.json(); l.classList.add("hidden");
                if (data.schoolInfo) {
                    const info = data.schoolInfo[1].row[0], fmtD = (ds) => ds?.length===8 ? `${ds.substring(0,4)}년 ${ds.substring(4,6)}월 ${ds.substring(6,8)}일` : "-";
                    const flds = [
                        { l: "시도교육청", v: info.ATPT_OFCDC_SC_NM }, { l: "교육지원청", v: info.JU_ORG_NM || info.LCTN_SC_NM }, { l: "학교명", v: info.SCHUL_NM }, { l: "영문학교명", v: info.ENG_SCHUL_NM },
                        { l: "설립 구분", v: info.FOND_SC_NM }, { l: "성별 구분", v: info.COEDU_SC_NM }, { l: "주소", v: `${info.ORG_RDNMA||''} ${info.ORG_RDNDA||''}`.trim() },
                        { l: "홈페이지", v: info.HMPG_ADRES ? `<a href="${info.HMPG_ADRES}" target="_blank" class="text-indigo-500 hover:underline">열기 <i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : "-" },
                        { l: "전화", v: info.ORG_TELNO }, { l: "팩스", v: info.ORG_FAXNO }, { l: "설립일자", v: fmtD(info.FOND_YMD) }, { l: "개교기념일", v: fmtD(info.FOAS_MEMRD) }
                    ];
                    flds.forEach(f => { const d = document.createElement("div"); d.className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm"; d.innerHTML=`<p class="text-xs font-bold text-slate-400 mb-1.5">${f.l}</p><p class="text-sm font-semibold text-slate-800 break-all">${f.v||"-"}</p>`; g.appendChild(d); });
                } else g.innerHTML = `<div class="col-span-2 p-5 text-center text-slate-500 bg-slate-50 rounded-xl">데이터 없음</div>`;
            } catch(e) { l.classList.add("hidden"); }
        }
        function closeSchoolInfoModal() { const m=document.getElementById("schoolInfoModal"), c=document.getElementById("schoolInfoModalContent"); m.classList.add("opacity-0"); c.classList.add("scale-95"); setTimeout(()=>{m.classList.add("hidden"); m.classList.remove("flex");}, 200); }

        async function fetchAndShowMealInfo() {
            const m = document.getElementById("mealInfoModal"), c = document.getElementById("mealInfoModalContent"), b = document.getElementById("mealInfoBody"), l = document.getElementById("mealInfoLoading");
            document.getElementById("mealModalTitle").innerText = `${state.school} 식단`; b.innerHTML = ""; l.classList.remove("hidden"); m.classList.remove("hidden"); m.classList.add("flex"); setTimeout(() => { m.classList.remove("opacity-0"); c.classList.remove("scale-95"); }, 10);
            const sInfo = SCHOOLS_DB[`${state.region}_${state.school}`];
            if(!sInfo) return;
            try {
                const res = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=5&ATPT_OFCDC_SC_CODE=${sInfo.officeCode}&SD_SCHUL_CODE=${sInfo.schoolCode}&MLSV_YMD=${state.date.replace(/-/g,"")}`);
                const data = await res.json(); l.classList.add("hidden");
                if (data.mealServiceDietInfo) {
                    data.mealServiceDietInfo[1].row.forEach(r => {
                        let dH = r.DDISH_NM.replace(/<br\/>/g, "<br>").replace(/\b(1[0-9]|[1-9])\b/g, m => ALLERGY_MAP[m] ? `<span title="${ALLERGY_MAP[m]}" class="cursor-help font-extrabold text-orange-600 border-b border-dotted border-orange-400 px-0.5">${m}</span>` : m);
                        const d = document.createElement("div"); d.className = "bg-white p-5 rounded-2xl border shadow-sm space-y-3";
                        d.innerHTML = `<div class="flex justify-between border-b pb-2"><span class="bg-orange-100 text-orange-700 text-xs font-black px-2.5 py-1 rounded-lg"><i class="fa-solid fa-bowl-rice"></i> ${r.MMEAL_SC_NM||'급식'}</span><span class="text-xs text-slate-400">${r.MLSV_YMD.substring(0,4)}.${r.MLSV_YMD.substring(4,6)}.${r.MLSV_YMD.substring(6,8)}</span></div><div><p class="text-[10px] font-bold text-slate-400 mb-1">식단</p><p class="text-sm font-semibold">${dH}</p></div><div class="pt-2 border-t space-y-3"><div><p class="text-[10px] font-bold text-slate-400">원산지</p><p class="text-xs text-slate-600">${(r.ORPLC_INFO||"").replace(/<br\s*\/?>/gi, ", ")}</p></div><div><p class="text-[10px] font-bold text-slate-400">칼로리</p><p class="text-xs font-bold">${r.CAL_INFO||"-"}</p></div></div>`;
                        b.appendChild(d);
                    });
                } else b.innerHTML = `<div class="text-center py-12 text-slate-500">급식 정보 없음</div>`;
            } catch(e) { l.classList.add("hidden"); }
        }
        function closeMealInfoModal() { const m=document.getElementById("mealInfoModal"), c=document.getElementById("mealInfoModalContent"); m.classList.add("opacity-0"); c.classList.add("scale-95"); setTimeout(()=>{m.classList.add("hidden"); m.classList.remove("flex");}, 200); }

        /* ==================== 8. INIT ==================== */
        window.onload = async function() {
            const sReg = localStorage.getItem("neis_saved_region"), sSch = localStorage.getItem("neis_saved_school"), sGrd = localStorage.getItem("neis_saved_grade"), sCls = localStorage.getItem("neis_saved_class");
            if (sReg && ALL_REGION_NAMES.includes(sReg)) state.region = sReg;
            await loadDynamicSchools();
            document.getElementById("initialLoader").remove();
            
            document.getElementById("regionSelect").value = state.region; populateSchoolSelect();
            let isLoaded = false;
            if (sSch && REGIONS[state.region].includes(sSch)) { state.school = sSch; isLoaded = true; } 
            else state.school = REGIONS[state.region][0] || "";
            document.getElementById("schoolSelect").value = state.school;
            if (sGrd) state.grade = sGrd; if (sCls) state.class = sCls;
            
            state.date = getFormattedDate(new Date()); document.getElementById("datePicker").value = state.date;
            const aInfo = autoDetermineYearSemester(state.date); state.year = aInfo.academicYear; state.semester = aInfo.semester;
            document.getElementById("yearSelect").value = state.year; document.getElementById("semesterSelect").value = state.semester;

            updateSavedSchoolDisplay();
            await fetchAndUpdateSchoolStructure(); 
            await renderTimetable();
            if (isLoaded) setTimeout(() => showToast(`내 기기에 저장된 [${state.school}] 시간표를 불러왔습니다.`, "success"), 500);
        };
    </script>
</body>
</html>
