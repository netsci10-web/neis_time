<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초등학교 시간표 검색기 (NEIS & 학교알리미 연계)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .print-grid { gap: 0 !important; }
            .print-border { border: 1px solid #e2e8f0; }
        }
        
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter { animation: slideInUp 0.3s ease-out forwards; }
        .toast-exit { animation: fadeOut 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 no-print shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md">
                    <i class="fa-solid fa-school text-xl"></i>
                </div>
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-lg font-bold tracking-tight text-slate-900 leading-tight">초등학교 통합 검색기</h1>
                        <!-- API 상태 모니터링 버튼 -->
                        <button id="apiStatusBtn" class="text-[10px] font-bold py-1 px-2 rounded-md border transition flex items-center gap-1 bg-slate-50 text-slate-500 border-slate-200 cursor-default">

                        </button>

            </div>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col gap-6">

                <!-- 학년도 -->

                    <label class="text-xs font-semibold text-slate-500">학년도</label>

                            <option value="2024" disabled class="text-slate-400 bg-slate-200">2024학년도 (API 연계불가)</option>

                        </select>

                    </div>
                </div>

                <!-- 학기 -->

                                <option value="1">1학년</option>
                                <option value="2">2학년</option>
                                <option value="3">3학년</option>
                                <option value="4" selected>4학년</option>

                <!-- 조회 버튼 -->

            </form>

            <!-- 날짜 주간 탐색 및 기준일 선택 -->
            <div class="mt-4 pt-4 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <label class="text-xs font-semibold text-slate-500 whitespace-nowrap">기준 주간 선택:</label>
                    <div class="flex items-center gap-2 bg-slate-100 p-1 rounded-xl border border-slate-200">
                        <button onclick="changeWeek(-1)" class="p-1.5 hover:bg-white rounded-lg transition text-slate-600 hover:text-slate-900 shadow-sm"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <input type="date" id="datePicker" onchange="handleDateChange()" class="bg-transparent border-none text-sm font-semibold focus:outline-none px-2 text-slate-700">
                        <button onclick="changeWeek(1)" class="p-1.5 hover:bg-white rounded-lg transition text-slate-600 hover:text-slate-900 shadow-sm"><i class="fa-solid fa-chevron-right text-xs"></i></button>

                <div class="flex gap-2">

        <!-- 시간표 대시보드 메인 영역 -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            
            <!-- 좌측: 학교 상세 정보 및 요약 정보 패널 -->
            <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm border border-slate-100 p-5 no-print sticky top-20">

                    <div class="w-16 h-16 mx-auto bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center text-3xl mb-3 shadow-inner">

                    </div>
                    <h2 id="sideSchoolName" class="font-extrabold text-lg text-slate-900">마산중앙초등학교</h2>

                <div class="space-y-4">
                    <ul class="text-sm space-y-3">

                            <span class="flex items-center gap-1.5"><i class="fa-regular fa-calendar-check text-slate-400 w-4"></i> 학년도/학기</span>
                            <span id="sideSemText" class="font-semibold text-slate-900">2025학년도 1학기</span>
                        </li>
                        <li class="flex justify-between items-center text-slate-600">
                            <span class="flex items-center gap-1.5"><i class="fa-regular fa-clock text-slate-400 w-4"></i> 기본 교시</span>
                            <span class="font-semibold text-slate-900">1~6교시 (40분)</span>

                    </ul>
                    
                    <div class="pt-2 flex flex-col gap-2">
                        <!-- 나이스 학교 기본정보 조회 버튼 -->
                        <button onclick="fetchAndShowSchoolInfo()" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold py-2.5 px-4 rounded-xl transition duration-150 flex items-center justify-center gap-1.5 border border-indigo-200 border-dashed">
                            <i class="fa-solid fa-building-columns"></i> NEIS 학교 기본정보

                    </div>
                </div>
            </div>

            <!-- 우측: 주간 시간표 그리드 -->
            <div class="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-100 p-4 sm:p-6 overflow-hidden">
                
                <div class="flex justify-between items-end mb-4 sm:mb-6">
                    <div>
                        <h2 class="text-xl sm:text-2xl font-black text-slate-900 tracking-tight flex items-center gap-2">

                </div>

                <div class="overflow-x-auto hide-scrollbar">
                    <div id="timetableGrid" class="min-w-[600px] grid grid-cols-5 gap-2 sm:gap-4 print-grid">

                <div id="loadingIndicator" class="hidden my-12 text-center">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-3"></i>
                    <p class="text-sm text-slate-500 font-medium animate-pulse">교육청 서버에서 데이터를 불러오는 중입니다...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- 푸터 -->
    <footer class="bg-slate-900 text-slate-400 text-xs py-8 mt-12 border-t border-slate-800 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col justify-center items-center text-center gap-2">
            <span class="text-slate-500">본 서비스는 나이스 교육정보 개방포털 공공데이터(OpenAPI)를 활용합니다.</span>

    <!-- 모달: 수업 상세 정보 -->
    <div id="lessonModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity opacity-0">

                <div class="absolute inset-0 bg-gradient-to-r from-indigo-500 to-purple-600 opacity-10"></div>
                <h3 id="modalSubject" class="font-extrabold text-xl text-slate-800 relative z-10">과목</h3>
                <button onclick="closeLessonModal()" class="text-slate-400 hover:text-slate-600 transition relative z-10 bg-white/50 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>

            <div class="p-6 space-y-5">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500">
                        <i class="fa-regular fa-clock"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">교시</p>
                        <p id="modalPeriod" class="text-sm font-semibold text-slate-800">-</p>
                    </div>
                </div>
                
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-100">
                    <p class="text-xs font-bold text-indigo-500 mb-1 flex items-center gap-1.5"><i class="fa-solid fa-book-open"></i> 공부할 문제</p>

    <!-- 모달: NEIS 학교 기본정보 API 결과 -->
    <div id="schoolInfoModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[85vh]" id="schoolInfoModalContent">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-600 text-white">
                <h3 class="font-bold text-lg flex items-center gap-2">
                    <i class="fa-solid fa-building-columns"></i> NEIS 학교 기본정보 명세

            </div>
            <div id="schoolInfoContent" class="p-6 overflow-y-auto hide-scrollbar bg-slate-50 flex-1 relative">
                <div id="schoolInfoLoading" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-50/80 backdrop-blur-sm z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-indigo-500 mb-2"></i>
                    <p class="text-sm font-medium text-slate-600">NEIS 서버 응답을 대기 중...</p>
                </div>
                <div id="schoolInfoGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
            </div>
            <div class="p-4 border-t border-slate-100 bg-white flex justify-end">
                <button onclick="closeSchoolInfoModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-slate-100 hover:bg-slate-200 text-slate-700 transition">닫기</button>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 컨테이너 -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex flex-col gap-2 z-50 pointer-events-none w-full max-w-sm px-4"></div>

    <script>
        /* ==============================================
         * 1. 상태 및 상수 데이터 관리
         * ============================================== */
        // 마산 지역(합포구, 회원구) 초등학교 전체 목록 (가나다 순 정렬)
        const MASAN_SCHOOL_NAMES = [
            "가고파초등학교", "가포초등학교", "감천초등학교", "광려초등학교", "교동초등학교",
            "교방초등학교", "구산초등학교", "구산초등학교구서분교장", "구암초등학교", "내서초등학교",
            "마산고운초등학교", "마산신월초등학교", "마산중앙초등학교", "무학초등학교", "반동초등학교", 
            "봉덕초등학교", "북성초등학교", "산호초등학교", "삼계초등학교", "상남초등학교", 
            "상일초등학교", "석전초등학교", "성호초등학교", "안계초등학교", "양덕초등학교", 
            "완월초등학교", "용마초등학교", "우산초등학교", "월성초등학교", "월영초등학교", 
            "월포초등학교", "전안초등학교", "중리초등학교", "진동초등학교", "진전초등학교", 
            "팔룡초등학교", "하북초등학교", "합성초등학교", "합포초등학교", "해운초등학교",
            "현동초등학교", "호계초등학교", "회원초등학교"
        ].sort();

        // 이름을 기반으로 SCHOOLS_DB 자동 생성 (학교 코드는 API로 자동 탐색됨)
        const SCHOOLS_DB = {};
        MASAN_SCHOOL_NAMES.forEach(name => {
            SCHOOLS_DB[name] = { 
                officeCode: "S10", // 경상남도 교육청
                schoolCode: "",    // ensureSchoolCode 함수를 통해 자동 보정됨
                name: name, 
                region: "경남", 
                resolved: false 
            };
        });

        const state = {
            school: "마산중앙초등학교",
            year: "2025",
            semester: "1",
            grade: "4",
            class: "",
            date: "", // YYYY-MM-DD
            apiKey: "89f71f30a00545d2b8fc928abf0fcaee"
        };

        const subjectColors = {
            "국어": "bg-red-50 text-red-600 border-red-100",
            "수학": "bg-blue-50 text-blue-600 border-blue-100",
            "사회": "bg-orange-50 text-orange-600 border-orange-100",
            "과학": "bg-green-50 text-green-600 border-green-100",
            "영어": "bg-indigo-50 text-indigo-600 border-indigo-100",
            "음악": "bg-pink-50 text-pink-600 border-pink-100",
            "미술": "bg-yellow-50 text-yellow-600 border-yellow-100",
            "체육": "bg-teal-50 text-teal-600 border-teal-100",
            "도덕": "bg-purple-50 text-purple-600 border-purple-100",
            "실과": "bg-rose-50 text-rose-600 border-rose-100",
            "창체": "bg-slate-50 text-slate-600 border-slate-200",
            "없음": "bg-gray-50 text-gray-400 border-gray-100 border-dashed"
        };

        /* ==============================================
         * 2. 유틸리티 함수
         * ============================================== */
        function getFormattedDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getWeekRange(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const date = new Date(y, m - 1, d);
            const day = date.getDay();
            const diffToMonday = day === 0 ? -6 : 1 - day;
            
            const monday = new Date(date);
            monday.setDate(date.getDate() + diffToMonday);
            
            const days = [];
            for (let i = 0; i < 5; i++) { 
                const currentD = new Date(monday);
                currentD.setDate(monday.getDate() + i);
                days.push({
                    date: currentD,
                    dateStr: getFormattedDate(currentD),
                    dayName: ['월', '화', '수', '목', '금'][i]
                });
            }
            return days;
        }

        function autoDetermineYearSemester(dateStr) {
            const [yStr, mStr, dStr] = dateStr.split('-');
            const d = new Date(yStr, mStr - 1, dStr);
            let year = d.getFullYear();
            const month = d.getMonth() + 1;
            let sem = "1";

            if (month <= 2) {
                year -= 1;
                sem = "2";
            } else if (month >= 3 && month <= 7) {
                sem = "1";
            } else {
                sem = "2";
            }
            if (year < 2025) year = 2025;
            if (year > 2026) year = 2026;

            return { academicYear: String(year), semester: sem };
        }

        /* ==============================================
         * 3. UI 알림 및 API 상태 표시기
         * ============================================== */
        let toastTimeout;
        function showToast(message, type = "info") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast-enter p-3 rounded-xl shadow-lg border flex items-center gap-3 text-sm font-semibold pointer-events-auto bg-white`;
            
            let icon = '<i class="fa-solid fa-circle-info text-blue-500"></i>';
            if (type === "success") icon = '<i class="fa-solid fa-circle-check text-green-500"></i>';
            else if (type === "error") icon = '<i class="fa-solid fa-circle-exclamation text-red-500"></i>';

            toast.innerHTML = `${icon} <span class="text-slate-700">${message}</span>`;
            
            container.innerHTML = '';
            container.appendChild(toast);

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.replace("toast-enter", "toast-exit");
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function setApiStatus(isOnline) {
            const btn = document.getElementById("apiStatusBtn");
            if (isOnline) {
                btn.innerHTML = `<i class="fa-solid fa-wifi"></i> 정상 연동`;
                btn.className = "text-[10px] font-bold py-1 px-2 rounded-md border transition flex items-center gap-1 bg-green-50 text-green-600 border-green-200 cursor-default shadow-sm";
                btn.onclick = null;
            } else {
                btn.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> API 응답없음`;
                btn.className = "text-[10px] font-bold py-1 px-2 rounded-md border transition flex items-center gap-1 bg-red-50 text-red-600 border-red-200 hover:bg-red-100 cursor-pointer shadow-sm";
                btn.onclick = () => checkApiConnection(true);
            }
        }

        async function checkApiConnection(forceRefresh = false) {
            const btn = document.getElementById("apiStatusBtn");
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> 확인중...`;
            btn.className = "text-[10px] font-bold py-1 px-2 rounded-md border transition flex items-center gap-1 bg-slate-50 text-slate-500 border-slate-200 cursor-default shadow-sm";
            
            if (!state.apiKey) {
                setApiStatus(false);
                return;
            }
            try {
                const s = SCHOOLS_DB["마산중앙초등학교"];
                // 검색 명칭(SCHUL_NM)으로 연동 테스트를 진행하여 하드코딩 코드 불일치 오류 우회
                const url = `https://open.neis.go.kr/hub/schoolInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1&ATPT_OFCDC_SC_CODE=${s.officeCode}&SCHUL_NM=${encodeURIComponent(s.name)}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.RESULT) {
                    if (data.RESULT.CODE !== "INFO-000" && data.RESULT.CODE !== "INFO-200") {
                        throw new Error(data.RESULT.MESSAGE);
                    }
                }

                if (response.ok) {
                    setApiStatus(true);
                    if (forceRefresh) {
                        showToast("API 서버와 정상적으로 연동되었습니다.", "success");
                        await ensureSchoolCode(state.school);
                        await updateClassDropdownUI();
                        renderTimetable();
                    }
                } else {
                    setApiStatus(false);
                }
            } catch (e) {
                setApiStatus(false);
                if (forceRefresh) showToast("API 통신 실패 또는 잘못된 키입니다.", "error");
            }
        }

        /* ==============================================
         * 4. API 통신 로직 (NEIS 및 학교알리미)
         * ============================================== */
         
        // 학교 표준코드 동적 보정 (API 조회 실패 방지용)
        async function ensureSchoolCode(schoolName) {
            if (!state.apiKey) return;
            const school = SCHOOLS_DB[schoolName];
            if (!school || school.resolved) return;

            const url = `https://open.neis.go.kr/hub/schoolInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1&ATPT_OFCDC_SC_CODE=${school.officeCode}&SCHUL_NM=${encodeURIComponent(school.name)}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.schoolInfo && data.schoolInfo[1] && data.schoolInfo[1].row) {
                    school.schoolCode = data.schoolInfo[1].row[0].SD_SCHUL_CODE;
                    school.resolved = true;
                }
            } catch (e) {
                console.warn("School code resolution failed:", e);
            }
        }

        // NEIS 1: 시간표
        async function fetchNeisTimetable(year, sem, dateStr, grade, classNm) {
            if (!state.apiKey || !classNm) return null;
            const schoolInfo = SCHOOLS_DB[state.school] || SCHOOLS_DB["마산중앙초등학교"];
            const formattedYmd = dateStr.replace(/-/g, "");
            const requestUrl = `https://open.neis.go.kr/hub/elsTimetable?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${schoolInfo.officeCode}&SD_SCHUL_CODE=${schoolInfo.schoolCode}&AY=${year}&SEM=${sem}&ALL_TI_YMD=${formattedYmd}&GRADE=${grade}&CLASS_NM=${classNm}`;
            try {
                const response = await fetch(requestUrl);
                if (!response.ok) throw new Error();
                const data = await response.json();
                setApiStatus(true);
                if (data.RESULT) {
                    if (data.RESULT.CODE === "INFO-200") return null;
                    if (data.RESULT.CODE !== "INFO-000") throw new Error();
                }
                return data;
            } catch (err) {
                setApiStatus(false);
                return null;
            }
        }

        // NEIS 2: 학교 기본정보
        async function fetchNeisSchoolInfoAPI() {
            if (!state.apiKey) return null;
            const schoolInfo = SCHOOLS_DB[state.school] || SCHOOLS_DB["마산중앙초등학교"];
            const requestUrl = `https://open.neis.go.kr/hub/schoolInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=1&ATPT_OFCDC_SC_CODE=${schoolInfo.officeCode}&SD_SCHUL_CODE=${schoolInfo.schoolCode}`;
            try {
                const response = await fetch(requestUrl);
                const data = await response.json();
                
                if (data.RESULT) {
                    if (data.RESULT.CODE === "INFO-200") return null;
                    if (data.RESULT.CODE !== "INFO-000") throw new Error();
                }
                
                setApiStatus(true);
                if (data.schoolInfo && data.schoolInfo[1]) {
                    return data.schoolInfo[1].row[0];
                }
                return null;
            } catch (e) {
                setApiStatus(false);
                return null;
            }
        }

        // NEIS 3: 학급 정보(드롭다운용)
        async function fetchNeisClassInfoAPI(officeCode, schoolCode, year, grade) {
            if (!state.apiKey) return null;
            const requestUrl = `https://open.neis.go.kr/hub/classInfo?KEY=${state.apiKey}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${officeCode}&SD_SCHUL_CODE=${schoolCode}&AY=${year}&GRADE=${grade}`;
            try {
                const response = await fetch(requestUrl);
                const data = await response.json();
                
                if (data.RESULT) {
                    if (data.RESULT.CODE === "INFO-200") {
                        setApiStatus(true);
                        return null; 
                    }
                    if (data.RESULT.CODE !== "INFO-000") throw new Error();
                }
                
                setApiStatus(true);
                if (data.classInfo && data.classInfo[1]) {
                    const rows = data.classInfo[1].row;
                    let classes = rows.map(r => r.CLASS_NM).filter(c => c);
                    classes.sort((a, b) => parseInt(a) - parseInt(b));
                    return [...new Set(classes)]; 
                }
                return null;
            } catch (e) {
                setApiStatus(false);
                return null;
            }
        }

        /* ==============================================
         * 5. UI 렌더링 로직
         * ============================================== */

        async function updateClassDropdownUI() {
            const schoolCodeInfo = SCHOOLS_DB[document.getElementById("schoolSelect").value] || SCHOOLS_DB["마산중앙초등학교"];
            const year = document.getElementById("yearSelect").value;
            const grade = document.getElementById("gradeSelect").value;
            const classSelect = document.getElementById("classSelect");
            
            const currentVal = classSelect.value;
            classSelect.innerHTML = `<option value="">로딩중...</option>`;
            classSelect.disabled = true;

            const classList = await fetchNeisClassInfoAPI(schoolCodeInfo.officeCode, schoolCodeInfo.schoolCode, year, grade);
            
            classSelect.innerHTML = "";
            classSelect.disabled = false;

            if (classList && classList.length > 0) {
                classList.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = c;
                    opt.innerText = `${c}반`;
                    classSelect.appendChild(opt);
                });
                
                if (classList.includes(currentVal)) {
                    classSelect.value = currentVal;
                } else {
                    classSelect.value = classList[0];
                }
            } else {
                const opt = document.createElement("option");
                opt.value = "";
                opt.innerText = "반 정보 없음";
                classSelect.appendChild(opt);
                classSelect.value = "";
            }
            state.class = classSelect.value;
        }

        async function renderTimetable() {
            document.getElementById("sideSchoolName").innerText = state.school;
            document.getElementById("sideGradeClass").innerText = state.class ? `${state.grade}학년 ${state.class}반` : `${state.grade}학년 (정보없음)`;
            document.getElementById("sideSemText").innerText = `${state.year}학년도 ${state.semester}학기`;
            
            const weekDays = getWeekRange(state.date);
            document.getElementById("weekRangeTitle").innerText = `(${weekDays[0].dateStr.substring(5).replace('-','/')} ~ ${weekDays[4].dateStr.substring(5).replace('-','/')})`;

            const grid = document.getElementById("timetableGrid");
            grid.innerHTML = '';
            document.getElementById("loadingIndicator").classList.remove("hidden");

            for (const dayInfo of weekDays) {
                const col = document.createElement("div");
                col.className = "flex flex-col gap-2 min-w-[110px]";
                
                const isToday = dayInfo.dateStr === getFormattedDate(new Date());
                const headerBg = isToday ? "bg-indigo-600 text-white shadow-md" : "bg-slate-100 text-slate-700";
                
                col.innerHTML = `
                    <div class="${headerBg} rounded-xl p-2 sm:p-3 text-center border ${isToday ? 'border-indigo-600' : 'border-slate-200'}">
                        <p class="font-extrabold text-sm sm:text-base">${dayInfo.dayName}요일</p>
                        <p class="text-[10px] sm:text-xs font-medium opacity-80 mt-0.5">${dayInfo.dateStr.substring(5).replace('-','.')}</p>
                    </div>
                    <div id="col-${dayInfo.dateStr}" class="flex flex-col gap-2 flex-grow"></div>
                `;
                grid.appendChild(col);

                let lessons = [];
                const apiResult = await fetchNeisTimetable(state.year, state.semester, dayInfo.dateStr, state.grade, state.class);
                
                if (apiResult && apiResult.elsTimetable && apiResult.elsTimetable[1]) {
                    const rows = apiResult.elsTimetable[1].row;
                    lessons = rows.map(r => ({
                        period: parseInt(r.PERIO),
                        subject: r.ITRT_CNTNT.replace(/\*/g, '').trim(),
                        content: "-",
                        supplies: "-",
                        type: "API연동"
                    }));
                }

                const colContainer = document.getElementById(`col-${dayInfo.dateStr}`);
                
                const maxPeriod = 6;
                for (let p = 1; p <= maxPeriod; p++) {
                    const matched = lessons.find(l => l.period === p);
                    let lessonData = matched;

                    if (!lessonData) {
                        lessonData = { period: p, subject: "없음", content: "일정 없음", supplies: "-", type: "데이터 부재", isEmpty: true };
                    }

                    const card = document.createElement("div");
                    const colorClass = subjectColors[lessonData.subject] || "bg-slate-50 text-slate-700 border-slate-200";
                    
                    card.className = `border rounded-xl p-2 sm:p-3 relative cursor-pointer transition transform hover:-translate-y-0.5 hover:shadow-md ${colorClass} ${lessonData.isEmpty ? 'opacity-60 cursor-default' : ''}`;
                    
                    if (!lessonData.isEmpty) {
                        card.onclick = () => openLessonModal(lessonData);
                    }

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[10px] font-bold opacity-60 bg-white/50 px-1.5 py-0.5 rounded-md">${p}교시</span>
                            ${lessonData.type === 'API연동' ? '<i class="fa-solid fa-link text-[8px] opacity-40"></i>' : ''}
                        </div>
                        <div class="text-center py-2 sm:py-3">
                            <h4 class="font-extrabold text-xs sm:text-sm tracking-tight">${lessonData.subject}</h4>
                        </div>
                    `;
                    colContainer.appendChild(card);
                }
            }
            document.getElementById("loadingIndicator").classList.add("hidden");
        }

        /* ==============================================
         * 6. 이벤트 컨트롤러
         * ============================================== */

        async function handleGradeChange() {
            state.grade = document.getElementById("gradeSelect").value;
            showToast(`${state.grade}학년 반 정보를 나이스 서버에서 동기화 중입니다.`, "info");
            await updateClassDropdownUI(); 
            await renderTimetable(); 
        }

        async function handleYearChange() {
            state.year = document.getElementById("yearSelect").value;
            await updateClassDropdownUI();
            await renderTimetable();
        }

        async function handleSchoolChange() {
            state.school = document.getElementById("schoolSelect").value;
            await ensureSchoolCode(state.school);
            await updateClassDropdownUI(); 
            showToast(`[${state.school}] 학교로 변경되었습니다.`, "info");
            await renderTimetable();
        }

        async function handleFilterChange() {
            state.semester = document.getElementById("semesterSelect").value;
            state.class = document.getElementById("classSelect").value;
            await renderTimetable();
        }

        async function changeWeek(direction) {
            const [y, m, d] = state.date.split('-');
            const current = new Date(y, m - 1, d);
            current.setDate(current.getDate() + (direction * 7));
            state.date = getFormattedDate(current);
            document.getElementById("datePicker").value = state.date;
            
            const autoInfo = autoDetermineYearSemester(state.date);
            const prevYear = document.getElementById("yearSelect").value;
            document.getElementById("yearSelect").value = autoInfo.academicYear;
            document.getElementById("semesterSelect").value = autoInfo.semester;

            if (prevYear !== autoInfo.academicYear) {
                await updateClassDropdownUI();
            }
            await renderTimetable();
        }

        async function handleDateChange() {
            state.date = document.getElementById("datePicker").value;
            const autoInfo = autoDetermineYearSemester(state.date);
            const prevYear = document.getElementById("yearSelect").value;
            document.getElementById("yearSelect").value = autoInfo.academicYear;
            document.getElementById("semesterSelect").value = autoInfo.semester;
            
            if (prevYear !== autoInfo.academicYear) {
                await updateClassDropdownUI();
            }
            await renderTimetable();
        }

        async function applyFilters() {
            state.school = document.getElementById("schoolSelect").value;
            state.year = document.getElementById("yearSelect").value;
            state.semester = document.getElementById("semesterSelect").value;
            state.grade = document.getElementById("gradeSelect").value;
            
            await ensureSchoolCode(state.school);
            await updateClassDropdownUI(); 
            state.class = document.getElementById("classSelect").value;

            await renderTimetable();
            showToast("선택하신 조건으로 시간표가 갱신되었습니다.", "success");
        }

        function printTimetable() {
            window.print();
        }

        /* ==============================================
         * 7. 모달(UI) 및 공시정보 시각화 컨트롤
         * ============================================== */
        function openLessonModal(data) {
            if (data.isEmpty) return;
            document.getElementById("modalSubject").innerText = data.subject;
            document.getElementById("modalPeriod").innerText = `${data.period}교시`;
            document.getElementById("modalContent").innerText = data.content || "상세 수업 내용이 제공되지 않았습니다.";
            
            const modal = document.getElementById("lessonModal");
            const content = document.getElementById("lessonModalContent");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            setTimeout(() => {
                modal.classList.remove("opacity-0");
                content.classList.remove("scale-95");
            }, 10);
        }

        function closeLessonModal() {
            const modal = document.getElementById("lessonModal");
            const content = document.getElementById("lessonModalContent");
            modal.classList.add("opacity-0");
            content.classList.add("scale-95");
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }, 200);
        }

        // 학교 기본정보 (NEIS)
        async function fetchAndShowSchoolInfo() {
            const modal = document.getElementById("schoolInfoModal");
            const content = document.getElementById("schoolInfoModalContent");
            const grid = document.getElementById("schoolInfoGrid");
            const loading = document.getElementById("schoolInfoLoading");
            
            grid.innerHTML = '';
            loading.classList.remove("hidden");
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            setTimeout(() => { modal.classList.remove("opacity-0"); content.classList.remove("scale-95"); }, 10);

            let info = await fetchNeisSchoolInfoAPI();
            loading.classList.add("hidden");

            if (!info) {
                grid.innerHTML = `<div class="col-span-1 sm:col-span-2 p-5 text-center text-slate-500 bg-slate-100/50 rounded-xl font-medium border border-slate-200">해당 학교의 API 정보를 불러올 수 없거나 데이터가 없습니다.</div>`;
                return;
            }
            
            const fields = [
                { label: "시도교육청명", value: info.ATPT_OFCDC_SC_NM },
                { label: "학교명", value: info.SCHUL_NM },
                { label: "영문학교명", value: info.ENG_SCHUL_NM },
                { label: "설립명", value: info.FOND_SC_NM },
                { label: "도로명주소", value: info.ORG_RDNMA },
                { label: "전화번호", value: info.ORG_TELNO },
                { label: "홈페이지", value: info.HMPG_ADRES ? `<a href="${info.HMPG_ADRES}" target="_blank" class="text-indigo-500 hover:underline">링크 열기</a>` : "-" },
                { label: "개교기념일", value: info.FOAS_MEMRD ? `${info.FOAS_MEMRD.substring(0,4)}년 ${info.FOAS_MEMRD.substring(4,6)}월 ${info.FOAS_MEMRD.substring(6,8)}일` : "-" }
            ];

            fields.forEach(f => {
                const item = document.createElement("div");
                item.className = "bg-white p-3 rounded-xl border border-slate-200 shadow-sm";
                item.innerHTML = `
                    <p class="text-[10px] font-bold text-slate-400 mb-1">${f.label}</p>
                    <p class="text-sm font-semibold text-slate-800 break-all">${f.value || "-"}</p>
                `;
                grid.appendChild(item);
            });
        }

        function closeSchoolInfoModal() {
            const modal = document.getElementById("schoolInfoModal");
            const content = document.getElementById("schoolInfoModalContent");
            modal.classList.add("opacity-0");
            content.classList.add("scale-95");
            setTimeout(() => { modal.classList.add("hidden"); modal.classList.remove("flex"); }, 200);
        }

        // 초기화
        window.onload = async function() {
            // 셀렉트 박스에 마산 전체 초등학교 43개 목록 동적 주입
            const schoolSelect = document.getElementById("schoolSelect");
            schoolSelect.innerHTML = "";
            MASAN_SCHOOL_NAMES.forEach(name => {
                const opt = document.createElement("option");
                opt.value = name;
                opt.innerText = `${name} (마산)`;
                schoolSelect.appendChild(opt);
            });
            schoolSelect.value = state.school; // 초기 선택값 "마산중앙초등학교"로 유지

            const storedNeis = localStorage.getItem("neis_timetable_apikey");
            if (storedNeis !== null && storedNeis !== "") state.apiKey = storedNeis;
            
            state.date = getFormattedDate(new Date());
            document.getElementById("datePicker").value = state.date;
            
            const autoInfo = autoDetermineYearSemester(state.date);
            document.getElementById("yearSelect").value = autoInfo.academicYear;
            document.getElementById("semesterSelect").value = autoInfo.semester;

            await checkApiConnection(); 
            await ensureSchoolCode(state.school);
            await updateClassDropdownUI(); 
            await renderTimetable();
        };
    </script>
